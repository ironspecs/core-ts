name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Check package
        run: bun pm pack --dry-run
        working-directory: react

      - name: Check i18n package
        run: bun pm pack --dry-run
        working-directory: react-i18n

      - name: Check progression package
        run: bun pm pack --dry-run
        working-directory: react-progression

      - name: Check form builder package
        run: bun pm pack --dry-run
        working-directory: react-form-builder

      - name: Test packed package exports
        run: |
          mkdir -p "$RUNNER_TEMP/package-test/packages/react"
          mkdir -p "$RUNNER_TEMP/package-test/packages/react-i18n"
          mkdir -p "$RUNNER_TEMP/package-test/packages/react-progression"
          mkdir -p "$RUNNER_TEMP/package-test/packages/react-form-builder"
          (cd react && bun pm pack --destination "$RUNNER_TEMP/package-test")
          (cd react-i18n && bun pm pack --destination "$RUNNER_TEMP/package-test")
          (cd react-progression && bun pm pack --destination "$RUNNER_TEMP/package-test")
          (cd react-form-builder && bun pm pack --destination "$RUNNER_TEMP/package-test")
          cd "$RUNNER_TEMP/package-test"
          tar -xzf core-ts-react-0.1.0.tgz -C packages/react --strip-components=1
          tar -xzf core-ts-react-i18n-0.1.0.tgz -C packages/react-i18n --strip-components=1
          tar -xzf core-ts-react-progression-0.1.0.tgz -C packages/react-progression --strip-components=1
          tar -xzf core-ts-react-form-builder-0.1.0.tgz -C packages/react-form-builder --strip-components=1
          cat > package.json <<'EOF'
          {
            "name": "package-test",
            "private": true,
            "type": "module",
            "workspaces": [
              "packages/react",
              "packages/react-i18n",
              "packages/react-progression",
              "packages/react-form-builder"
            ],
            "dependencies": {
              "@core-ts/react": "0.1.0",
              "@core-ts/react-i18n": "0.1.0",
              "@core-ts/react-progression": "0.1.0",
              "@core-ts/react-form-builder": "0.1.0",
              "i18next": "^25.6.0",
              "react": "^19",
              "react-dom": "^19",
              "typescript": "~5.7.2"
            }
          }
          EOF
          bun install
          cat > tsconfig.json <<'EOF'
          {
            "compilerOptions": {
              "strict": true,
              "target": "ES2022",
              "module": "NodeNext",
              "moduleResolution": "NodeNext",
              "jsx": "react-jsx",
              "skipLibCheck": false,
              "noEmit": true
            }
          }
          EOF
          cat > package-types.test.mts <<'EOF'
          import {
            cn,
            Heading,
            Typography,
            MarkdownBlock,
            ThemeToggleIconButton,
            ErrorBoundary,
            FeatureFlagProvider,
            useFeatureFlags,
            useMediaQuery,
            useMountEffect,
            resolveFeatureFlags,
            type FeatureFlags,
            type HeadingProps,
            type MarkdownBlockProps,
            type ThemeToggleIconButtonProps,
            createMock,
            deleteByPath,
            getByPath,
            getByPathOr,
            setByPath,
          } from '@core-ts/react';
          import {
            createLabels,
            SUPPORTED_LANGUAGE_CODES,
            type SupportedLanguage,
          } from '@core-ts/react-i18n';
          import {
            clampWorkflowCursor,
            createEmptyWorkflowContextValues,
            createStepOperation,
            type WorkflowOperation,
          } from '@core-ts/react-progression';
          import {
            FieldRenderer,
            FormBuilder,
            SectionShell,
            buildSparseMergePatchFromFinalForm,
            getIn,
            joinName,
            registry,
            setIn,
            type DotPath,
            type FieldComponent,
            type FieldComponentProps,
            type FormBuilderProps,
            type FormContext,
            type FormSchema,
            type Registry,
            type ViewerSchema,
          } from '@core-ts/react-form-builder';

          const className: string = cn('a', false, 'b');
          const flags: FeatureFlags = {};
          const language: SupportedLanguage = SUPPORTED_LANGUAGE_CODES[0];
          const labels = createLabels({
            useLanguage: () => language,
            getTranslator: () => (key) => key,
          });
          const cursor: number = clampWorkflowCursor({ cursor: 2, size: 4 });
          const contextValues = createEmptyWorkflowContextValues();
          const operation: WorkflowOperation<Record<string, unknown>, Record<string, unknown>> =
            createStepOperation({
              operationId: 'step',
              checkerId: 'checker',
              blockId: 'block',
            });
          const path: DotPath = joinName('root', 'child');
          const formSchema: FormSchema = [];
          const formProps: FormBuilderProps = {
            data: {},
            schema: formSchema,
            registry,
            context: {},
            labels: {
              submitButton: 'Submit',
              resetButton: 'Reset',
            },
            onSubmit: () => undefined,
          };
          const viewerSchema: ViewerSchema = {
            type: 'section',
            id: 'section',
            title: 'Section',
            fields: [],
          };
          const formContext: FormContext = {};
          const textInput = registry.textInput;
          const fieldComponent: FieldComponent = textInput;
          const fieldProps: FieldComponentProps = {
            field: { type: 'textInput', path: 'name', label: 'Name' },
            name: 'name',
            registry,
            context: formContext,
          };
          const registryShape: Registry = registry;
          const headingProps: HeadingProps = { as: 'h1', children: 'Heading' };
          const markdownProps: MarkdownBlockProps = { markdown: '# Title' };
          const themeToggleProps: ThemeToggleIconButtonProps = {
            labels: {
              switchToDarkMode: 'Switch to dark mode',
              switchToLightMode: 'Switch to light mode',
            },
          };
          const sectionShell = SectionShell;

          getByPath({ nested: { value: 42 } }, 'nested.value');
          getByPathOr({ nested: { value: 42 } }, 'nested.value', 0);
          setByPath({}, 'nested.value', 42);
          deleteByPath({ nested: { value: 42 } }, 'nested.value');
          createMock<{ id: string }>({ id: 'id_1' });
          getIn({ nested: { value: 42 } }, path);
          setIn({}, path, 42);
          buildSparseMergePatchFromFinalForm({ values: {}, modified: {} });
          labels;
          cursor;
          contextValues;
          operation;
          sectionShell;
          formProps;
          viewerSchema;
          fieldComponent;
          fieldProps;
          registryShape;
          headingProps;
          markdownProps;
          themeToggleProps;
          EOF
          bunx tsc --noEmit
          cat > package-private-subpaths.test.mts <<'EOF'
          // @ts-expect-error deep imports are not part of the public API
          import { getByPath as privateGetByPath } from '@core-ts/react/lib/objs';
          // @ts-expect-error deep imports are not part of the public API
          import { SUPPORTED_LANGUAGES as privateSupportedLanguages } from '@core-ts/react-i18n/lib/i18n';
          // @ts-expect-error deep imports are not part of the public API
          import { getCurrentLanguage as privateGetCurrentLanguage } from '@core-ts/react-i18n/lib/language';
          // @ts-expect-error deep imports are not part of the public API
          import { createLabels as privateCreateLabels } from '@core-ts/react-i18n/hooks/useLabels';
          // @ts-expect-error deep imports are not part of the public API
          import { compileWorkflowPlan as privateCompileWorkflowPlan } from '@core-ts/react-progression/lib/workflow';
          // @ts-expect-error deep imports are not part of the public API
          import { createEmptyWorkflowContextValues as privateCreateEmptyWorkflowContextValues } from '@core-ts/react-progression/lib/workflow-context-values';
          // @ts-expect-error deep imports are not part of the public API
          import { useWorkflowRuntime as privateUseWorkflowRuntime } from '@core-ts/react-progression/hooks/useProgressionWorkflow';
          // @ts-expect-error deep imports are not part of the public API
          import { SectionShell as privateSectionShell } from '@core-ts/react-form-builder/fields/sectionShell';

          privateGetByPath;
          privateSupportedLanguages;
          privateGetCurrentLanguage;
          privateCreateLabels;
          privateCompileWorkflowPlan;
          privateCreateEmptyWorkflowContextValues;
          privateUseWorkflowRuntime;
          privateSectionShell;
          EOF
          bunx tsc --noEmit
          cat > package.test.mjs <<'EOF'
          import assert from 'node:assert/strict';
          import test from 'node:test';

          test('package root export resolves from packed install', async () => {
            const root = await import('@core-ts/react');
            assert.equal(typeof root.cn, 'function');
            assert.equal(root.cn('a', false, 'b'), 'a b');
            assert.equal(typeof root.Heading, 'function');
            assert.equal(typeof root.Typography, 'function');
            assert.equal(typeof root.getByPath, 'function');
            assert.equal(root.getByPath({ nested: { value: 42 } }, 'nested.value'), 42);
          });

          test('i18n root export resolves from packed install', async () => {
            const i18n = await import('@core-ts/react-i18n');
            assert.equal(typeof i18n.createLabels, 'function');
            assert.ok(Array.isArray(i18n.SUPPORTED_LANGUAGES));
          });

          test('progression root export resolves from packed install', async () => {
            const progression = await import('@core-ts/react-progression');
            assert.equal(typeof progression.clampWorkflowCursor, 'function');
            assert.equal(progression.clampWorkflowCursor({ cursor: 9, size: 2 }), 1);
          });

          test('form builder root export resolves from packed install', async () => {
            const formBuilder = await import('@core-ts/react-form-builder');
            assert.equal(typeof formBuilder.FormBuilder, 'function');
            assert.equal(typeof formBuilder.FieldRenderer, 'function');
            assert.equal(typeof formBuilder.SectionShell, 'function');
            assert.equal(typeof formBuilder.registry.textInput, 'function');
            assert.equal(formBuilder.getIn({ nested: { value: 42 } }, 'nested.value'), 42);
          });

          test('private subpaths are not exported from packed packages', async () => {
            const privateSubpaths = [
              '@core-ts/react/lib/objs',
              '@core-ts/react-i18n/lib/i18n',
              '@core-ts/react-i18n/lib/language',
              '@core-ts/react-i18n/hooks/useLabels',
              '@core-ts/react-progression/lib/workflow',
              '@core-ts/react-progression/lib/workflow-context-values',
              '@core-ts/react-progression/hooks/useProgressionWorkflow',
              '@core-ts/react-form-builder/fields/sectionShell',
            ];

            for (const specifier of privateSubpaths) {
              await assert.rejects(
                import(specifier),
                (error) =>
                  error &&
                  error.code === 'ERR_PACKAGE_PATH_NOT_EXPORTED',
              );
            }
          });
          EOF
          node --test package.test.mjs

  dts-release-gate:
    if: github.event_name == 'push' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Find latest release artifact run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list \
            --workflow release-artifact.yml \
            --branch release \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId' > "$RUNNER_TEMP/release-run-id"
          test -s "$RUNNER_TEMP/release-run-id"

      - name: Download latest release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "$(cat "$RUNNER_TEMP/release-run-id")" \
            --pattern 'dist-*' \
            --dir "$RUNNER_TEMP/release-artifact"

      - name: Compare declaration files
        run: |
          if [[ -d "$RUNNER_TEMP/release-artifact/react/dist" ]]; then
            scripts/assert-dts-match.sh "$RUNNER_TEMP/release-artifact" "$GITHUB_WORKSPACE"
          else
            artifact_root=$(find "$RUNNER_TEMP/release-artifact" -mindepth 1 -maxdepth 1 -type d | sort | tail -n 1)
            scripts/assert-dts-match.sh "$artifact_root" "$GITHUB_WORKSPACE"
          fi
