name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Check package
        run: npm pack --dry-run
        working-directory: react

      - name: Test packed package
        run: |
          mkdir -p "$RUNNER_TEMP/package-test"
          npm pack --pack-destination "$RUNNER_TEMP/package-test"
          cd "$RUNNER_TEMP/package-test"
          npm init -y
          npm install ./*.tgz react@^19 react-dom@^19
          cat > package.test.mjs <<'EOF'
          import assert from 'node:assert/strict';
          import test from 'node:test';

          test('package root export resolves from packed install', async () => {
            const root = await import('@core-ts/react');
            assert.equal(typeof root.cn, 'function');
            assert.equal(root.cn('a', false, 'b'), 'a b');
            assert.equal(typeof root.Heading, 'function');
            assert.equal(typeof root.Typography, 'function');
          });

          test('lib objs subpath export resolves from packed install', async () => {
            const objs = await import('@core-ts/react/lib/objs');
            assert.equal(typeof objs.getByPath, 'function');
            assert.equal(objs.getByPath({ nested: { value: 42 } }, 'nested.value'), 42);
          });
          EOF
          node --test package.test.mjs
        working-directory: react
